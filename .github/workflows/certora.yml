name: certora

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        conf:
          - CreatedObligations
          - Hasher
          - Liquidate
          - Midnight
          - SharePrice
          - Solvency

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Jq
        uses: sergeysova/jq-action@v2

      - name: Run Certora Config Linter
        run: |
          file="certora/confs/${{ matrix.conf }}.conf"
          echo "Fix lint errors by applying the following diff to $file:"
          diff -u "$file" <(jq < "$file")

      - uses: actions/setup-python@v5

      - name: Install certora
        run: pip install certora-cli

      - name: Run Certora Specs Linter
        run: |
          file="certora/specs/${{ matrix.conf }}.spec"
          echo "Fix lint errors by applying the following diff to $file:"
          diff -u "$file" <(certoraCVLFormatter "$file")

      - name: Install solc
        run: |
          wget https://github.com/ethereum/solidity/releases/download/v0.8.31/solc-static-linux
          chmod +x solc-static-linux
          sudo mv solc-static-linux /usr/local/bin/solc-0.8.31

      - name: Verify ${{ matrix.conf }}
        run: certoraRun certora/confs/${{ matrix.conf }}.conf
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
